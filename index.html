<!doctype html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fasttime - Fokus va Unumdorlik</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/logo-fasttime.png" />
  <link rel="apple-touch-icon" href="/logo-fasttime.png" />
</head>


<body class="bg-black text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      ~
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registratsiya qilindi:', reg))
          .catch(err => console.error('SW xatolik:', err));
      });
    }
  </script>
</body>

</html>
